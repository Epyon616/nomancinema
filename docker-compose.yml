services: 
  back-end:
    build: 
      context: NoManBE
    container_name: no-man-back-end
    working_dir: /usr/src/app
    networks: 
      - node-network
    volumes: 
      - ./NoManBE:/usr/src/app
      - /usr/src/app/node_modules
    environment: 
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    tty: true
    ports: 
      - "${BE_PORT}:3000"
    command: npm start
    depends_on:
      - db

  front-end:
    build: 
      context: NoManFE
    container_name: no-man-front-end
    working_dir: /usr/src/app
    networks: 
      - node-network
    volumes: 
      - ./NoManFE:/usr/src/app
      - /usr/src/app/node_modules
    tty: true
    ports: 
      - "${FE_PORT}:5173"
    command: npm run dev
  
  db:
    build:
      context: database
    container_name: db
    restart: always
    tty: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - ./data:/var/lib/postgresql
    ports: 
      - "${POSTGRES_PORT}:5432"
    networks: 
      - node-network


  nginx:
    build: 
      context: nginx
    container_name: nginx
    restart: always
    tty: true
    ports: 
      - "8000:80"
    networks: 
      - node-network
    depends_on:
       - back-end
       - front-end
  
networks: 
  node-network:
    driver: bridge
volumes:
  data: {}
  node_modules: {}